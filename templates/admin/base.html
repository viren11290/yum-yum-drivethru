<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Admin — Yum Yum Drive Through{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    .sidebar { min-height: 100vh; background: #1a1a2e; }
    .sidebar .nav-link { color: #ccc; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: #e63946; border-radius: 8px; }
    .sidebar-brand { color: #fff; font-size: 1.2rem; font-weight: bold; }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <!-- Sidebar -->
    <div class="col-md-2 sidebar px-3 py-4">
      <div class="sidebar-brand mb-4 ps-2">🍺 Yum Yum Admin</div>
      <nav class="nav flex-column gap-1">
        <a href="{{ url_for('admin_dashboard') }}" class="nav-link {% if request.endpoint == 'admin_dashboard' %}active{% endif %}">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>
        <a href="{{ url_for('admin_products') }}" class="nav-link {% if request.endpoint == 'admin_products' %}active{% endif %}">
          <i class="bi bi-box-seam me-2"></i>Products
        </a>
        <a href="{{ url_for('admin_orders') }}" class="nav-link {% if request.endpoint == 'admin_orders' %}active{% endif %}">
          <i class="bi bi-receipt me-2"></i>Orders
        </a>
        <hr style="border-color:#444;">
        <a href="{{ url_for('index') }}" class="nav-link" target="_blank">
          <i class="bi bi-shop me-2"></i>View Store
        </a>
        <a href="{{ url_for('admin_logout') }}" class="nav-link text-danger">
          <i class="bi bi-box-arrow-left me-2"></i>Logout
        </a>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="col-md-10 py-4 px-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show">
            {{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endwith %}
      {% block content %}{% endblock %}
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
